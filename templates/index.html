<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot - Modern LLM Interface</title>
  <meta name="description" content="Modern AI Chatbot powered by advanced language models" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <main>
    <div class="chatbot">
      <div class="chat-header">
        <h1>AI Assistant</h1>
      </div>
      
      <div class="header-sub-text">
        <p>Intelligent Conversations · Powered by AI</p>
      </div>

      <div class="chat-messages" id="messages-container"></div>
      
      <form class="chat-form" id="message-form">
        <textarea 
          id="message-input" 
          placeholder="Type your message here... (Shift+Enter for new line)"
          rows="1"
        ></textarea>
        <button type="submit" aria-label="Send message">➤</button>
      </form>
    </div>
  </main>

  <footer>
    <p>© 2024 AI Chatbot · <a href="#" onclick="event.preventDefault(); location.reload();">New Chat</a></p>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
